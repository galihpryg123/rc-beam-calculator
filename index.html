<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RC Beam Design - SNI 2847:2019</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>RC Beam Design Calculator</h1>
    <p>Mengacu SNI 2847:2019</p>
</header>

<div class="container">

    <div class="card">
        <h2>Input Parameter</h2>

        <div class="grid">
            <div>
                <label>fc' (MPa)</label>
                <input type="number" id="fc" value="25">
            </div>

            <div>
                <label>fy (MPa)</label>
                <input type="number" id="fy" value="420">
            </div>

            <div>
                <label>Lebar b (mm)</label>
                <input type="number" id="b" value="300">
            </div>

            <div>
                <label>Tinggi h (mm)</label>
                <input type="number" id="h" value="600">
            </div>

            <div>
                <label>Selimut (mm)</label>
                <input type="number" id="cover" value="40">
            </div>

            <div>
                <label>Ø Tulangan Utama (mm)</label>
                <input type="number" id="db" value="16">
            </div>

            <div>
                <label>Ø Sengkang (mm)</label>
                <input type="number" id="ds" value="10">
            </div>

            <div>
                <label>Mu (kNm)</label>
                <input type="number" id="Mu" value="200">
            </div>

            <div>
                <label>Vu (kN)</label>
                <input type="number" id="Vu" value="150">
            </div>
        </div>

        <button id="designBtn">DESIGN BEAM</button>
    </div>

    <div class="card">
        <h2>Hasil Desain</h2>
        <div id="output" class="output-box">
            Tekan tombol DESIGN untuk menghitung.
        </div>
    </div>

</div>

<footer>
    © 2026 Galih Prayogo - Structural Engineering Tools
</footer>

<script src="script.js"></script>
</body>
</html>
