<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RC Beam Design - SNI 2847:2019</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>RC Beam Design Calculator</h1>
    <p>Mengacu SNI 2847:2019</p>
</header>

<div class="container">

    <div class="card">
        <h2>Input Data</h2>

        <div class="grid">
            <input type="number" id="fc" placeholder="fc' (MPa)" value="25">
            <input type="number" id="fy" placeholder="fy (MPa)" value="420">
            <input type="number" id="b" placeholder="Lebar b (mm)" value="300">
            <input type="number" id="h" placeholder="Tinggi h (mm)" value="600">
            <input type="number" id="cover" placeholder="Selimut (mm)" value="40">
            <input type="number" id="db" placeholder="Ø Tulangan (mm)" value="16">
            <input type="number" id="ds" placeholder="Ø Sengkang (mm)" value="10">
            <input type="number" id="Mu" placeholder="Mu (kNm)" value="200">
            <input type="number" id="Vu" placeholder="Vu (kN)" value="150">
        </div>

        <button type="button" onclick="designBeam()">DESIGN BEAM</button>
    </div>

    <div class="card">
        <h2>Hasil Perhitungan</h2>
        <div id="output">Klik DESIGN BEAM untuk menghitung.</div>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
