<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RC Beam Design – SNI 2847:2019</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>RC Beam Design Calculator</h1>
    <h2>Mengacu SNI 2847:2019</h2>

    <div class="card">
        <h3>Input Data</h3>

        <label>fc' (MPa)</label>
        <input type="number" id="fc" value="25">

        <label>fy (MPa)</label>
        <input type="number" id="fy" value="420">

        <label>Lebar Balok b (mm)</label>
        <input type="number" id="b" value="300">

        <label>Tinggi Balok h (mm)</label>
        <input type="number" id="h" value="600">

        <label>Selimut Beton (mm)</label>
        <input type="number" id="cover" value="40">

        <label>Diameter Tulangan Utama (mm)</label>
        <input type="number" id="db" value="16">

        <label>Diameter Sengkang (mm)</label>
        <input type="number" id="ds" value="10">

        <label>Momen Terfaktor Mu (kNm)</label>
        <input type="number" id="Mu" value="200">

        <label>Geser Terfaktor Vu (kN)</label>
        <input type="number" id="Vu" value="150">

        <button onclick="designBeam()">DESIGN</button>
    </div>

    <div class="card">
        <h3>Hasil Desain</h3>
        <div id="output"></div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
