<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RC Beam Design – SNI 2847:2019</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>RC Beam Design Calculator</h1>
    <p>Mengacu SNI 2847:2019</p>
</header>

<div class="container">

<form id="beamForm">

<div class="card">
<h2>Input Data</h2>

<div class="grid">

<div class="input-group">
<label>fc'</label>
<input type="number" id="fc" value="25">
<span>MPa</span>
</div>

<div class="input-group">
<label>fy</label>
<input type="number" id="fy" value="420">
<span>MPa</span>
</div>

<div class="input-group">
<label>Lebar b</label>
<input type="number" id="b" value="300">
<span>mm</span>
</div>

<div class="input-group">
<label>Tinggi h</label>
<input type="number" id="h" value="600">
<span>mm</span>
</div>

<div class="input-group">
<label>Selimut</label>
<input type="number" id="cover" value="40">
<span>mm</span>
</div>

<div class="input-group">
<label>Ø Tulangan</label>
<input type="number" id="db" value="16">
<span>mm</span>
</div>

<div class="input-group">
<label>Ø Sengkang</label>
<input type="number" id="ds" value="10">
<span>mm</span>
</div>

<div class="input-group">
<label>Mu</label>
<input type="number" id="Mu" value="200">
<span>kNm</span>
</div>

<div class="input-group">
<label>Vu</label>
<input type="number" id="Vu" value="150">
<span>kN</span>
</div>

</div>

<button type="submit">DESIGN BEAM</button>

</div>
</form>

<div class="card">
<h2>Hasil Perhitungan</h2>
<div id="output">Klik DESIGN BEAM untuk menghitung.</div>
</div>

</div>

<script src="script.js"></script>
</body>
</html>
